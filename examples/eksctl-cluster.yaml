apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig

metadata:
  name: rhaii-poc
  region: us-east-2
  version: "1.33"

managedNodeGroups:
  - name: system
    instanceType: m5.xlarge
    desiredCapacity: 2
    minSize: 1
    maxSize: 3
    volumeSize: 100
    labels:
      role: system

  - name: gpu-l4
    instanceType: g6.xlarge
    desiredCapacity: 1
    minSize: 0
    maxSize: 1
    volumeSize: 200
    labels:
      role: gpu
      nvidia.com/gpu.product: L4
