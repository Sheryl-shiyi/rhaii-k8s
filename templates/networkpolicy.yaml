{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "rhaii.fullname" . }}
  labels:
    {{- include "rhaii.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "rhaii.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        {{- toYaml .Values.networkPolicy.allowFrom | nindent 8 }}
      ports:
        - port: {{ .Values.service.targetPort }}
          protocol: TCP
{{- end }}
