{{- if and (eq .Values.model.source "huggingface") .Values.huggingface.token }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "rhaii.fullname" . }}-hf-token
  labels:
    {{- include "rhaii.labels" . | nindent 4 }}
type: Opaque
stringData:
  HF_TOKEN: {{ .Values.huggingface.token | quote }}
{{- end }}
